version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Kiev
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Europe/Kiev
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: deps
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Europe/Kiev
    open-pull-requests-limit: 5
    ignore:
      # v5 requires self-hosted Actions Runner 2.327.1 or newer. Keep the
      # public composite action compatible with older supported runners.
      - dependency-name: actions/cache
        update-types:
          - version-update:semver-major
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
