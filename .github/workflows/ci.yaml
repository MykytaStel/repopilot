name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  msrv:
    name: Rust MSRV 1.87
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust 1.87
        uses: dtolnay/rust-toolchain@1.87

      - name: Check locked build
        run: cargo check --all-targets --all-features --locked

      - name: Test locked build
        run: cargo test --all --locked

  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all

      - name: RepoPilot CI gate
        shell: bash
        run: |
          set +e
          cargo run -- scan . --baseline .repopilot/baseline.json --fail-on new-high --format markdown --output /tmp/repopilot-ci.md
          status=$?

          if ((status != 0)); then
            if [[ -f /tmp/repopilot-ci.md ]]; then
              echo "RepoPilot CI report:"
              cat /tmp/repopilot-ci.md
            else
              echo "RepoPilot CI report was not generated."
            fi
          fi

          exit "$status"

      - name: Upload RepoPilot CI report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: repopilot-ci-report
          path: /tmp/repopilot-ci.md
          if-no-files-found: ignore

      - name: CLI release smoke tests
        run: cargo test --test cli_release_smoke
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Test npm wrapper
        run: npm run test:npm

      - name: Verify npm package
        run: npm pack --dry-run

  security:
    name: Security and maintenance checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust security tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Rust dependency security audit
        run: cargo audit

      - name: Cargo dependency policy
        run: cargo deny check advisories licenses

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Shell script validation
        shell: bash
        run: |
          scripts=()
          if [[ -f install.sh ]]; then
            scripts+=(install.sh)
          fi
          if [[ -d scripts ]]; then
            while IFS= read -r -d '' script; do
              scripts+=("$script")
            done < <(find scripts -maxdepth 1 -type f -name '*.sh' -print0)
          fi

          if ((${#scripts[@]} == 0)); then
            echo "No shell scripts found."
            exit 0
          fi

          shellcheck "${scripts[@]}"

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.x'
          cache: false

      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: GitHub Actions validation
        shell: bash
        run: |
          workflows=()
          if [[ -d .github/workflows ]]; then
            while IFS= read -r -d '' workflow; do
              workflows+=("$workflow")
            done < <(find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) -print0)
          fi

          if ((${#workflows[@]} == 0)); then
            echo "No GitHub Actions workflows found."
            exit 0
          fi

          actionlint "${workflows[@]}"

      - name: Install Node.js
        if: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: npm vulnerability audit
        if: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') != '' }}
        run: npm audit --audit-level=high
