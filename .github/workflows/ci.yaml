name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: "1.95.0"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all

      - name: Verify release contract
        run: python3 scripts/release-contract.py check

      - name: Test release contract
        run: npm run test:release-contract

      - name: Build release binary for performance gate
        run: cargo build --release

      - name: Changed review performance gate
        run: npm run review:performance

      - name: RepoPilot CI gate
        shell: bash
        run: |
          set +e
          cargo run -- scan . --fail-on-priority p1 --format markdown --output /tmp/repopilot-ci.md
          status=$?

          if ((status != 0)); then
            if [[ -f /tmp/repopilot-ci.md ]]; then
              echo "RepoPilot CI report:"
              cat /tmp/repopilot-ci.md
            else
              echo "RepoPilot CI report was not generated."
            fi
          fi

          exit "$status"

      - name: Upload RepoPilot CI report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: repopilot-ci-report
          path: /tmp/repopilot-ci.md
          if-no-files-found: ignore

      - name: CLI release smoke tests
        run: cargo test --test cli_release_smoke
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - name: Test npm wrapper
        run: npm run test:npm

      - name: Verify npm package
        run: npm pack --dry-run

  security:
    name: Security and maintenance checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install Rust security tools
        run: |
          cargo install cargo-audit --version 0.22.2 --locked
          cargo install cargo-deny --version 0.19.8 --locked

      - name: Rust dependency security audit
        run: cargo audit

      - name: Cargo dependency policy
        run: cargo deny check advisories licenses

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Shell script validation
        shell: bash
        run: |
          scripts=()
          if [[ -f install.sh ]]; then
            scripts+=(install.sh)
          fi
          if [[ -d scripts ]]; then
            while IFS= read -r -d '' script; do
              scripts+=("$script")
            done < <(find scripts -maxdepth 1 -type f -name '*.sh' -print0)
          fi

          if ((${#scripts[@]} == 0)); then
            echo "No shell scripts found."
            exit 0
          fi

          shellcheck "${scripts[@]}"

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25.4'
          cache: false

      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: GitHub Actions validation
        shell: bash
        run: |
          workflows=()
          if [[ -d .github/workflows ]]; then
            while IFS= read -r -d '' workflow; do
              workflows+=("$workflow")
            done < <(find .github/workflows -maxdepth 1 -type f \( -name '*.yml' -o -name '*.yaml' \) -print0)
          fi

          if ((${#workflows[@]} == 0)); then
            echo "No GitHub Actions workflows found."
            exit 0
          fi

          actionlint "${workflows[@]}"

      - name: Install Node.js
        if: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20

      - name: npm vulnerability audit
        if: ${{ hashFiles('package-lock.json', 'npm-shrinkwrap.json') != '' }}
        run: npm audit --audit-level=high
