name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  RUST_STABLE: "1.95.0"

jobs:
  verify-contract:
    name: Verify release contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_STABLE }}

      - name: Verify tag, versions, docs, and package contents
        run: python3 scripts/release-contract.py check --tag "${GITHUB_REF_NAME}"

      - name: Verify publishing credentials
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          test -n "$CRATES_IO_TOKEN" || {
            echo "::error::CRATES_IO_TOKEN is required for an official release"
            exit 1
          }
          test -n "$HOMEBREW_TAP_TOKEN" || {
            echo "::error::HOMEBREW_TAP_TOKEN is required for an official release"
            exit 1
          }

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: verify-contract
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_STABLE }}
          targets: ${{ matrix.target }}

      - name: Add Rust target for native build
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        # rust-toolchain.toml pins `channel = "stable"`, which cargo resolves to
        # a different toolchain instance than the pinned RUST_STABLE that the
        # toolchain action added the target to. Add the target to the toolchain
        # cargo actually uses (resolved here in the repo dir) so non-host targets
        # — e.g. x86_64-apple-darwin on the now-arm64 macos-latest runner — have
        # std available.
        run: rustup target add ${{ matrix.target }}

      - name: Install cross (Linux aarch64 only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross --rev f8151ae777290430cf2108efacf3976d9528500b --locked

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          BINARY_NAME=repopilot
          ASSET_NAME="${BINARY_NAME}-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" dist/
          cd dist
          tar -czf "${ASSET_NAME}.tar.gz" "${BINARY_NAME}"
          shasum -a 256 "${ASSET_NAME}.tar.gz" > "${ASSET_NAME}.tar.gz.sha256"
          echo "ASSET=dist/${ASSET_NAME}.tar.gz" >> "$GITHUB_ENV"
          echo "CHECKSUM=dist/${ASSET_NAME}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $BinaryName = "repopilot"
          $AssetName = "${BinaryName}-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${BinaryName}.exe" dist/
          Compress-Archive -Path "dist/${BinaryName}.exe" -DestinationPath "dist/${AssetName}.zip"
          Get-FileHash "dist/${AssetName}.zip" -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  ${AssetName}.zip" } | Out-File -Encoding ascii "dist/${AssetName}.zip.sha256"
          echo "ASSET=dist/${AssetName}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "CHECKSUM=dist/${AssetName}.zip.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@b3e506e8c389afc651c5bacf2b8f2a1ea0557215 # v4
        with:
          subject-path: |
            ${{ env.ASSET }}
            ${{ env.CHECKSUM }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.CHECKSUM }}
          if-no-files-found: error

  verify-crates-package:
    name: Verify crates.io package
    runs-on: ubuntu-latest
    needs: verify-contract
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_STABLE }}

      - name: Publish dry run
        run: cargo publish --dry-run

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build
      - verify-crates-package
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download packaged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate release notes from changelog
        run: |
          python3 scripts/release-contract.py notes \
            --tag "${GITHUB_REF_NAME}" \
            --output dist/release-notes.md

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          name: RepoPilot ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          body_path: dist/release-notes.md
          generate_release_notes: false

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs:
      - release
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_STABLE }}

      - name: Publish
        run: cargo publish

  publish-npm:
    name: Publish npm packages
    needs:
      - release
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm.yml
    with:
      tag: ${{ github.ref_name }}
    secrets: inherit

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs:
      - release
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Extract checksums
        run: |
          V="${{ github.ref_name }}"
          MACOS_ARM="$(awk '{print $1}' "dist/repopilot-${V}-aarch64-apple-darwin.tar.gz.sha256")"
          MACOS_X86="$(awk '{print $1}' "dist/repopilot-${V}-x86_64-apple-darwin.tar.gz.sha256")"
          LINUX_ARM="$(awk '{print $1}' "dist/repopilot-${V}-aarch64-unknown-linux-gnu.tar.gz.sha256")"
          LINUX_X86="$(awk '{print $1}' "dist/repopilot-${V}-x86_64-unknown-linux-gnu.tar.gz.sha256")"
          {
            echo "MACOS_ARM=${MACOS_ARM}"
            echo "MACOS_X86=${MACOS_X86}"
            echo "LINUX_ARM=${LINUX_ARM}"
            echo "LINUX_X86=${LINUX_X86}"
            echo "VER=${V#v}"
          } >> "$GITHUB_ENV"

      - name: Checkout homebrew tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: MykytaStel/homebrew-repopilot
          path: tap
          token: ${{ env.HOMEBREW_TAP_TOKEN }}

      - name: Write formula
        run: |
          sed -e "s/{{VERSION}}/${{ env.VER }}/g" \
              -e "s/{{MACOS_ARM_SHA}}/${{ env.MACOS_ARM }}/g" \
              -e "s/{{MACOS_X86_SHA}}/${{ env.MACOS_X86 }}/g" \
              -e "s/{{LINUX_ARM_SHA}}/${{ env.LINUX_ARM }}/g" \
              -e "s/{{LINUX_X86_SHA}}/${{ env.LINUX_X86 }}/g" \
              Formula/repopilot.rb > tap/Formula/repopilot.rb

      - name: Push formula update
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/repopilot.rb
          git diff --cached --quiet || git commit -m "repopilot ${{ env.VER }}"
          git push

  verify-publication:
    name: Verify public release channels
    runs-on: ubuntu-latest
    needs:
      - publish-crates
      - publish-npm
      - update-homebrew-tap
    permissions:
      contents: read
    steps:
      - name: Verify GitHub, crates.io, npm, and Homebrew
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION_NUMBER="${VERSION#v}"

          assets="$(gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          for target in \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            x86_64-apple-darwin \
            aarch64-apple-darwin \
            x86_64-pc-windows-msvc; do
            grep -q "repopilot-${VERSION}-${target}" <<<"$assets"
          done

          for attempt in {1..20}; do
            echo "Publication verification attempt ${attempt}/20"
            crate_version="$(curl -fsSL "https://crates.io/api/v1/crates/repopilot/${VERSION_NUMBER}" | jq -r '.version.num' || true)"
            npm_version="$(npm view repopilot version 2>/dev/null || true)"
            formula="$(curl -fsSL "https://raw.githubusercontent.com/MykytaStel/homebrew-repopilot/main/Formula/repopilot.rb" || true)"
            npm_platforms_ready=true
            for package in \
              @repopilot/darwin-arm64 \
              @repopilot/darwin-x64 \
              @repopilot/linux-arm64-gnu \
              @repopilot/linux-x64-gnu \
              @repopilot/win32-x64-msvc; do
              if [[ "$(npm view "$package" version 2>/dev/null || true)" != "$VERSION_NUMBER" ]]; then
                npm_platforms_ready=false
              fi
            done
            if [[ "$crate_version" == "$VERSION_NUMBER" \
              && "$npm_version" == "$VERSION_NUMBER" \
              && "$formula" == *"repopilot-${VERSION}-"* \
              && "$npm_platforms_ready" == true ]]; then
              exit 0
            fi
            sleep 15
          done

          echo "::error::One or more public release channels did not converge to ${VERSION_NUMBER}"
          exit 1
