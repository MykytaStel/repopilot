[[rules]]
rule_id = "language.rust.panic-risk"
minimum_support = "rule-aware"
languages = ["rust"]
suppress_low_signal = true
suppress_config = true
suppress_generated = true

[[rules.overrides]]
signal = "rust.unwrap"
role = "test"
action = "suppress"
reason = "Rust unwrap in tests is usually assertion setup, not production panic risk."

[[rules.overrides]]
signal = "rust.expect"
role = "test"
action = "suppress"
reason = "Rust expect in tests is usually assertion setup, not production panic risk."

[[rules.overrides]]
signal = "rust.panic"
role = "test"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
signal = "rust.todo"
role = "test"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
signal = "rust.unimplemented"
role = "test"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
signal = "rust.unwrap"
runtime = "rust-cli"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
signal = "rust.expect"
runtime = "rust-cli"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
signal = "rust.panic"
runtime = "rust-cli"
action = "apply"
severity = "MEDIUM"

[[rules.overrides]]
signal = "rust.panic"
role = "domain"
action = "upgrade"
severity = "HIGH"

[[rules.overrides]]
signal = "rust.panic"
runtime = "rust-library"
action = "upgrade"
severity = "HIGH"

[[rules.overrides]]
signal = "rust.todo"
action = "upgrade"
severity = "HIGH"

[[rules.overrides]]
signal = "rust.unimplemented"
action = "upgrade"
severity = "HIGH"

# Rust test-support modules (`testutil.rs`, `test_utils.rs`, ...): production
# files whose `panic!`/`unwrap`/`expect` are test assertion plumbing, not runtime
# risk. Because such a module *does* compile in normal builds (it is not
# guaranteed test-only), the filename is enough evidence to hide the finding by
# default but not to delete it: all three are **downgraded to Low** — hidden in
# the default profile, still available under `--profile strict` (the high-recall
# mode) — while the file keeps its production role for every other rule.
# `todo!`/`unimplemented!` are left visible. Placed last so the downgrade wins
# over the `runtime = "rust-library"` panic upgrade above (unlike a real test
# file, a test-support module is not `is_test`, so it is not skipped by the
# test-gating that shields `tests/` files from those runtime upgrades).
[[rules.overrides]]
signal = "rust.unwrap"
role = "test-support"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
signal = "rust.expect"
role = "test-support"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
signal = "rust.panic"
role = "test-support"
action = "downgrade"
severity = "LOW"

