[[rules]]
rule_id = "language.python.exception-risk"
minimum_support = "rule-aware"
languages = ["python"]
suppress_low_signal = true
suppress_config = true
suppress_generated = true

[[rules.overrides]]
role = "test"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
role = "infrastructure"
action = "downgrade"
severity = "LOW"
reason = "Infrastructure files can be structurally dense without representing application-level complexity."

# `assert` (type-narrowing, internal invariants) and `raise NotImplementedError`
# (idiomatic abstract-method declarations) are overwhelmingly intentional in real
# Python, so they are not actionable in the default profile. Keep them as LOW
# (hidden by default, still surfaced under `--profile strict`); only the broad
# `except:` handler stays a default-visible signal.
[[rules.overrides]]
signal = "python.assert"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
signal = "python.not-implemented"
action = "downgrade"
severity = "LOW"

[[rules]]
rule_id = "language.javascript.runtime-exit-risk"
minimum_support = "context-aware"
languages = ["typescript", "typescript-react", "javascript", "javascript-react"]
suppress_low_signal = true
suppress_config = true
suppress_generated = true

[[rules.overrides]]
role = "test"
action = "suppress"

[[rules.overrides]]
runtime = "node"
role = "script"
signal = "js.process-exit"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
runtime = "node"
role = "app-entrypoint"
signal = "js.process-exit"
action = "downgrade"
severity = "LOW"

# A command handler in a CLI tool (a `commands/` file whose package declares
# `package.json#bin`) owns its own exit code, so its `process.exit` is an intended
# boundary. Downgrade to Low (hidden by default, kept in strict) rather than
# suppress, so the signal is recoverable. This does NOT cover reusable modules in
# the same package (`lib/`, `utils/`) or a non-CLI package's `domain/commands/` —
# both keep the default-visible High (see the `cli-executable` role).
[[rules.overrides]]
role = "cli-executable"
signal = "js.process-exit"
action = "downgrade"
severity = "LOW"

