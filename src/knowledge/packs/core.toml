[[rules]]
rule_id = "language.rust.panic-risk"
minimum_support = "rule-aware"
languages = ["rust"]
suppress_low_signal = true
suppress_config = true
suppress_generated = true

[[rules.overrides]]
signal = "rust.unwrap"
role = "test"
action = "suppress"
reason = "Rust unwrap in tests is usually assertion setup, not production panic risk."

[[rules.overrides]]
signal = "rust.expect"
role = "test"
action = "suppress"
reason = "Rust expect in tests is usually assertion setup, not production panic risk."

[[rules.overrides]]
signal = "rust.panic"
role = "test"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
signal = "rust.todo"
role = "test"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
signal = "rust.unimplemented"
role = "test"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
signal = "rust.unwrap"
runtime = "rust-cli"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
signal = "rust.expect"
runtime = "rust-cli"
action = "downgrade"
severity = "LOW"

[[rules.overrides]]
signal = "rust.panic"
runtime = "rust-cli"
action = "apply"
severity = "MEDIUM"

[[rules.overrides]]
signal = "rust.panic"
role = "domain"
action = "upgrade"
severity = "HIGH"

[[rules.overrides]]
signal = "rust.panic"
runtime = "rust-library"
action = "upgrade"
severity = "HIGH"

[[rules.overrides]]
signal = "rust.todo"
action = "upgrade"
severity = "HIGH"

[[rules.overrides]]
signal = "rust.unimplemented"
action = "upgrade"
severity = "HIGH"

