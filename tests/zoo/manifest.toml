# RepoPilot real-repo validation "zoo".
#
# Each entry is a real-world open-source repository, pinned to a fixed commit
# SHA, cloned on demand into a gitignored `.zoo/<name>/` directory. We never
# vendor repo contents; only the small per-repo finding *snapshots* under
# tests/zoo/snapshots/ are committed.
#
# The set is curated to exercise all 9 AST languages and their key frameworks
# plus a JS/TS monorepo (package boundaries). Swapping a repo or bumping a SHA
# is intentional and must be paired with `python3 scripts/zoo.py scan` +
# re-blessed snapshots (see tests/zoo/README.md).
#
# Pins captured 2026-06-18 (HEAD at that time). `python3 scripts/zoo.py
# verify-pins` checks each clone matches; `git ls-remote <url> HEAD` shows
# upstream HEAD if you want to advance a pin.

